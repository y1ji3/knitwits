


<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Thresholds</title>
	<style>
		body { margin: 0; padding: 24px; font-family: Arial, sans-serif; background: #f3f4f6; color: #111827; }
		.page { position: relative; max-width: 1100px; margin: 0 auto; background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 24px; }
		.notify-btn { position: absolute; top: 16px; right: 16px; width: 36px; height: 36px; border-radius: 10px; border: 1px solid #d1d5db; background: #f9fafb; color: #1f2937; display: inline-grid; place-items: center; text-decoration: none; font-size: 18px; }
		.notify-btn:hover { background: #e5e7eb; }
		.notify-btn.active { background: #111827; color: #ffffff; border-color: #111827; }
		h1 { margin-top: 0; margin-bottom: 16px; }
		nav { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
		nav a { text-decoration: none; color: #1f2937; background: #f9fafb; border: 1px solid #d1d5db; border-radius: 8px; padding: 6px 10px; }
		nav a:hover { background: #e5e7eb; }
		nav a.active { background: #111827; color: #ffffff; border-color: #111827; }
		table { width: 100%; border-collapse: collapse; margin-bottom: 14px; }
		th, td { text-align: left; padding: 10px; border-bottom: 1px solid #e5e7eb; }
		th { background: #f9fafb; }
		input[type="number"] { width: 100%; box-sizing: border-box; padding: 7px 10px; border-radius: 8px; border: 1px solid #d1d5db; }
		.button-row { display: flex; gap: 10px; flex-wrap: wrap; }
		button { padding: 8px 12px; border: none; border-radius: 8px; cursor: pointer; background: #111827; color: #fff; }
		button:hover { background: #374151; }
		.status { margin: 8px 0; padding: 8px 10px; border-radius: 8px; background: #ecfdf5; border: 1px solid #a7f3d0; }
		.error { margin: 8px 0; padding: 8px 10px; border-radius: 8px; background: #fef2f2; border: 1px solid #fecaca; }
	</style>
</head>
<body>
	<main class="page">
	<a href="/notifications/" class="notify-btn {% if active_page == 'notifications' %}active{% endif %}" title="Notifications" aria-label="Notifications">🔔</a>
	<h1>Thresholds</h1>

	<nav>
		<a href="/" class="{% if active_page == 'dashboard' %}active{% endif %}">Dashboard</a>
		<a href="/stock-status/" class="{% if active_page == 'stock_status' %}active{% endif %}">Stock Status</a>
		<a href="/pick-list/" class="{% if active_page == 'pick_list' %}active{% endif %}">Pick List</a>
		<a href="/thresholds/" class="{% if active_page == 'thresholds' %}active{% endif %}">Thresholds</a>
	</nav>

	<form method="post" action="/thresholds/">
		{% csrf_token %}
		{% if saved %}
			<p class="status">Threshold values updated.</p>
		{% endif %}
		{% if save_error %}
			<p class="error">{{ save_error }}</p>
		{% endif %}
		<table>
			<thead>
				<tr>
					<th>XS Threshold</th>
					<th>S Threshold</th>
					<th>M Threshold</th>
					<th>L Threshold</th>
					<th>XL Threshold</th>
				</tr>
			</thead>
			<tbody>
				<tr>
					<td><input type="number" name="xs_thresh" value="{{ threshold_values.xs_thresh }}" min="0"></td>
					<td><input type="number" name="s_thresh" value="{{ threshold_values.s_thresh }}" min="0"></td>
					<td><input type="number" name="m_thresh" value="{{ threshold_values.m_thresh }}" min="0"></td>
					<td><input type="number" name="l_thresh" value="{{ threshold_values.l_thresh }}" min="0"></td>
					<td><input type="number" name="xl_thresh" value="{{ threshold_values.xl_thresh }}" min="0"></td>
				</tr>
			</tbody>
		</table>

		<div class="button-row">
			<button type="submit">Save Thresholds</button>
			<button type="submit" name="refresh_calculations" value="1">Refresh Pick List Calculations</button>
		</div>
	</form>
	</main>
</body>
</html>
