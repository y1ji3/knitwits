


<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Thresholds</title>
</head>
<body>
	<h1>Thresholds</h1>

	<nav>
		<a href="/">Dashboard</a> |
		<a href="/low-stock/">Low Stock</a> |
		<a href="/out-of-stock/">Out of Stock</a> |
		<a href="/pick-list/">Pick List</a> |
		<a href="/notifications/">Notifications</a> |
		<a href="/thresholds/">Thresholds</a>
	</nav>

	<form method="post" action="/thresholds/">
		{% csrf_token %}
		{% if saved %}
			<p>Threshold values updated.</p>
		{% endif %}
		{% if save_error %}
			<p>{{ save_error }}</p>
		{% endif %}
		<table border="1" cellpadding="8" cellspacing="0">
			<thead>
				<tr>
					<th>XS Threshold</th>
					<th>S Threshold</th>
					<th>M Threshold</th>
					<th>L Threshold</th>
					<th>XL Threshold</th>
				</tr>
			</thead>
			<tbody>
				<tr>
					<td><input type="number" name="xs_thresh" value="{{ threshold_values.xs_thresh }}" min="0"></td>
					<td><input type="number" name="s_thresh" value="{{ threshold_values.s_thresh }}" min="0"></td>
					<td><input type="number" name="m_thresh" value="{{ threshold_values.m_thresh }}" min="0"></td>
					<td><input type="number" name="l_thresh" value="{{ threshold_values.l_thresh }}" min="0"></td>
					<td><input type="number" name="xl_thresh" value="{{ threshold_values.xl_thresh }}" min="0"></td>
				</tr>
			</tbody>
		</table>

		<but
        ton type="submit">Save Thresholds</button>
		<button type="submit" name="refresh_calculations" value="1">Refresh Pick List Calculations</button>
	</form>
</body>
</html>
